<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>404 — wrbell.eng</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <!-- SYNC: theme-detection script — identical copy in index.html -->
  <script>
    (function() {
      var theme;
      try { theme = localStorage.getItem('theme'); } catch(e) {}
      if (theme === 'light' || (!theme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('assets/fonts/inter-latin.v1.woff2') format('woff2');
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('assets/fonts/jetbrains-mono-latin.v1.woff2') format('woff2');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a12;
      --surface: #14141f;
      --border: #1e1e2e;
      --text: #e0e0e8;
      --muted: #7878a0;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.1);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius: 6px;
      --nav-height: 60px;
    }
    [data-theme="light"] {
      --bg: #f5f5f8;
      --surface: #ffffff;
      --border: #d8d8e0;
      --text: #1a1a2e;
      --muted: #5a5a78;
      --accent: #00b880;
      --accent-dim: rgba(0, 184, 128, 0.1);
    }
    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: radial-gradient(ellipse at 50% 0%, rgba(0, 229, 160, 0.03) 0%, var(--bg) 60%);
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    [data-theme="light"] body {
      background: radial-gradient(ellipse at 50% 0%, rgba(0, 184, 128, 0.04) 0%, var(--bg) 60%);
      background-color: var(--bg);
    }
    a { color: inherit; text-decoration: none; }
    nav {
      height: var(--nav-height);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 1.125rem;
      font-weight: 700;
    }
    .accent { color: var(--accent); }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: var(--font-mono);
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 60px rgba(0, 229, 160, 0.15);
    }
    .subtitle {
      font-family: var(--font-mono);
      font-size: 1.125rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .message {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 15px rgba(0, 229, 160, 0.06);
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }
    [data-theme="light"] .btn-primary {
      color: var(--text);
    }
    .btn-primary:hover {
      background: transparent;
      color: var(--accent);
    }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">wrbell<span class="accent">.eng</span></a>
  </nav>
  <div class="content">
    <h1 class="code">404</h1>
    <p class="subtitle">Page not found</p>
    <p class="message">This page doesn't exist — but the home page does.</p>
    <a href="/" class="btn btn-primary">&larr; Back to Home</a>
  </div>
</body>
</html>
