<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — wrbell.eng</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a12;
      --surface: #14141f;
      --border: #1e1e2e;
      --text: #e0e0e8;
      --muted: #7878a0;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.1);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius: 6px;
      --nav-height: 60px;
    }
    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: radial-gradient(ellipse at 50% 0%, rgba(0, 229, 160, 0.03) 0%, var(--bg) 60%);
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    nav {
      height: var(--nav-height);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 1.125rem;
      font-weight: 700;
    }
    .accent { color: var(--accent); }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: var(--font-mono);
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 60px rgba(0, 229, 160, 0.15);
    }
    .message {
      font-family: var(--font-mono);
      font-size: 1.125rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }
    .btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 15px rgba(0, 229, 160, 0.06);
    }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">wrbell<span class="accent">.eng</span></a>
  </nav>
  <div class="content">
    <div class="code">404</div>
    <p class="message">Page not found</p>
    <a href="/" class="btn">Return home</a>
  </div>
</body>
</html>
