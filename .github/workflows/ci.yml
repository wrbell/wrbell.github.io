name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          log_level: INFO
          extra: --ignore CSS

      - name: Upload validation log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: html-validation-log
          path: log.log

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI (mobile)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          artifactName: lighthouse-mobile

      - name: Lighthouse CI (desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc-desktop.json
          uploadArtifacts: true
          artifactName: lighthouse-desktop

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --accept 200,204,301,302,403,429,503
            --max-retries 3
            --retry-wait-time 5
            --root-dir .
            '*.html'
          fail: true

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: test-results/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  size-budget:
    name: Size Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build minified output
        run: npm run build

      - name: Check source size
        run: |
          SIZE=$(wc -c < index.html)
          echo "index.html (source): $SIZE bytes"
          if [ "$SIZE" -gt 153600 ]; then
            echo "::error::index.html source exceeds 150 KB ($SIZE bytes)"
            exit 1
          fi

      - name: Check minified size
        run: |
          SIZE=$(wc -c < dist/index.html)
          echo "index.html (minified): $SIZE bytes"
          if [ "$SIZE" -gt 92160 ]; then
            echo "::error::Minified index.html exceeds 90 KB ($SIZE bytes)"
            exit 1
          fi
